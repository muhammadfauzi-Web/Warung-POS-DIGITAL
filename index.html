<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir Warung Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Warung Digital POS</h1>
        <div id="status-koneksi" class="badge loading">Menghubungkan Sheets...</div>
    </header>

    <main class="container">
        <!-- Bagian Kiri: Daftar Produk -->
        <section class="produk-section">
            <h2>Daftar Produk</h2>
            <div id="grid-produk" class="grid-produk">
                <p class="loading-text">Sedang mengambil data produk dari Google Sheets...</p>
            </div>
        </section>

        <!-- Bagian Kanan: Keranjang & Pembayaran -->
        <section class="keranjang-section">
            <h2>Keranjang Belanja</h2>
            <div id="item-keranjang" class="item-keranjang">
                <p class="empty-text">Keranjang masih kosong</p>
            </div>
            
            <hr>

            <div class="total-pembayaran">
                <div class="row">
                    <span>Total Tagihan:</span>
                    <span id="total-tagihan">Rp 0</span>
                </div>
                <div class="row input-group">
                    <label for="input-bayar">Uang Bayar:</label>
                    <input type="number" id="input-bayar" placeholder="Masukkan nominal uang">
                </div>
                <div class="row">
                    <span>Kembalian:</span>
                    <span id="total-kembalian">Rp 0</span>
                </div>
                <button id="btn-transaksi" class="btn-primary" disabled>Proses & Simpan Transaksi</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
